{% extends "adminPanel/base.html" %}

{% block title %}FinTrack | Interest Configuration{% endblock title %}

{% block content %}
<div class="space-y-6 animate__animated animate__fadeInUp animate__faster">
    
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 items-center lg:items-start text-center lg:text-left animate__animated animate__fadeInDown">
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Loan Interest Settings</h1>
            <p class="text-sm text-slate-500 font-medium">Interest is calculated as: <span class="text-blue-600 font-bold">Repo Rate + Spread</span></p>
        </div>
        <div class="bg-blue-50 border border-blue-100 px-6 py-3 rounded-2xl flex items-center space-x-3">
            <div class="text-blue-600"><i class="fas fa-university text-xl"></i></div>
            <div>
                <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Current Repo Rate</p>
                <p id="display_repo_rate" class="text-lg font-black text-blue-700">--%</p>
            </div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm transition-all duration-300 hover:shadow-md hover:-translate-y-1">
        <form id="loan-interest-set-form" class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
            <div class="space-y-2">
                <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Select Loan Type</label>
                <div class="relative">
                    <select id="loan_id" class="w-full pl-4 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 appearance-none transition-all cursor-pointer">
                        <option value="" disabled selected>Choose type...</option>
                        {% if loan_type %}
                          {% for loan in loan_type %}
                            <option value="{{loan.id}}">{{loan.name}}</option>
                          {% endfor %}
                        {% endif %}
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Interest Spread (%)</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-plus text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                    </div>
                    <input id="interest_spread" type="number" step="0.01" min="0"
                           class="[appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" 
                    
                           placeholder="Enter Margin (e.g. 6.75)">
                </div>
            </div>

            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white h-[46px] rounded-2xl font-bold shadow-lg shadow-blue-200 transition-all active:scale-95 flex items-center justify-center space-x-2">
                <i class="fas fa-save"></i>
                <span>Set Configuration</span>
            </button>
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="cardContainer">
        </div>

</div>

<div id="editModal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl animate__animated animate__zoomIn animate__faster">
            <div class="flex items-center justify-between p-6 border-b border-slate-50">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fas fa-edit"></i></div>
                    <h3 class="text-lg font-black text-slate-800">Edit Interest Spread</h3>
                </div>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="editForm" class="p-6 space-y-5">
                <input type="hidden" id="editId">
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Loan Type</label>
                    <input type="text" id="editType" disabled class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-2xl text-sm font-bold text-slate-500">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">New Spread (%)</label>
                    <input type="number" id="editSpread" step="0.01" class="[appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-black text-slate-700 focus:ring-2 focus:ring-blue-500/20 outline-none">
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="closeEditModal()" class="flex-1 py-3 rounded-2xl border border-slate-200 font-bold">Cancel</button>
                    <button type="submit" class="flex-1 py-3 rounded-2xl bg-blue-600 text-white font-bold shadow-lg">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='adminPanel/js/masterSettings/loan_type_with_spread.js') }}"></script>
{% endblock content %}

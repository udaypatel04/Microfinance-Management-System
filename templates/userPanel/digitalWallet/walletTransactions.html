{% extends 'userPanel/base.html' %}

{% block title %}Wallet Ledger | Micro Finance{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-6xl">
    
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-6">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">Wallet Ledger</h1>
            <p class="text-slate-500 text-sm mt-1 uppercase font-bold tracking-tighter">Verified Digital Fund Flow</p>
        </div>
        
        <div class="flex items-center space-x-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200 shadow-inner">
            <button onclick="filterType('all')" class="filter-btn active px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-white shadow-sm text-slate-900">All</button>
            <button onclick="filterType('credit')" class="filter-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-emerald-600">Credits</button>
            <button onclick="filterType('debit')" class="filter-btn px-6 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-rose-600">Debits</button>
        </div>
    </div>

   <div id="transaction-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-stretch">
    </div>

    <div id="empty-state" class="hidden py-32 bg-white rounded-[3rem] border-2 border-dashed border-slate-100 flex flex-col items-center justify-center text-center">
        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-4">
            <i class="fas fa-history text-slate-200 text-3xl"></i>
        </div>
        <h3 class="text-slate-900 font-black text-xl">No transactions found</h3>
        <p class="text-slate-400 text-sm mt-2 max-w-xs">Try changing your filters or add funds to see activity.</p>
    </div>

   <div id="paginationCard" class="hidden mt-12 bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-xl shadow-slate-200/30 flex flex-col md:flex-row items-center justify-between gap-8 md:gap-6">
    
        <div class="flex flex-col md:flex-row items-center justify-center gap-3 order-1 md:order-2 w-full md:w-auto">
            
            <button onclick="changePage(-1)" id="prevBtn" 
                    class="h-12 w-12 md:h-11 md:w-11 rounded-2xl border border-slate-100 bg-white text-slate-400 hover:bg-emerald-50 hover:text-emerald-600 transition-all disabled:opacity-20 flex items-center justify-center shadow-sm">
               <i class="fas fa-chevron-left  text-xs"></i> </button>

            <div id="pageIndicator" class="flex items-center justify-center gap-2 px-3 py-2 bg-slate-50/50 rounded-[1.5rem] border border-slate-50 min-w-[200px] md:min-w-0">
                </div>

            <button onclick="changePage(1)" id="nextBtn" 
                    class="h-12 w-12 md:h-11 md:w-11 rounded-2xl border border-slate-100 bg-white text-slate-400 hover:bg-emerald-50 hover:text-emerald-600 transition-all disabled:opacity-20 flex items-center justify-center shadow-sm">
                <i class="fas fa-chevron-right text-xs"></i> </button>
        </div>

        <div class="px-5 py-2.5 bg-slate-50 rounded-full border border-slate-100 order-2 md:order-1">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest leading-none">
                Showing <span id="startRange" class="text-slate-900 font-black">0</span> - <span id="endRange" class="text-slate-900 font-black">0</span> 
                <span class="mx-1 text-slate-300">of</span> 
                <span id="totalEntries" class="text-slate-900 font-black">0</span>
            </p>
        </div>
    </div>


</div>

<script src="{{url_for('static', filename='userPanel/js/digitalWallet/wallet_transactions.js') }}"> </script>

{% endblock %}

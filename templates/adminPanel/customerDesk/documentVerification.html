{% extends "adminPanel/base.html" %}

{% block title %}FinTrack | Document Verify{% endblock title %}

{% block content %}
<div class="space-y-8 animate__animated animate__fadeInUp animate__faster pb-10">
    
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 items-center lg:items-start text-center lg:text-left animate__animated animate__fadeInDown">
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Document Verify</h1>
            <p class="text-sm text-slate-500 font-medium">Review and validate customer KYC documents for loan approval</p>
        </div>
    </div>

    <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm transition-all focus-within:shadow-md duration-300">
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-search text-slate-400 group-focus-within:text-blue-500 transition-all"></i>
            </div>
            <input type="text" id="docSearch" onkeyup="filterDocs()" 
                   class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" 
                   placeholder="Search by ID, Name or Email...">
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8" id="docContainer">
        </div>

    <div id="pagination" class="hidden bg-white p-6 md:px-6 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6">
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 order-1 md:order-2 w-full md:w-auto">
            
            <div class="flex items-center justify-center space-x-2 w-full sm:w-auto">
                
                <button onclick="changePage(-1)" id="prevBtn" class="h-11 w-11 rounded-xl border border-slate-100 bg-slate-50/50 text-slate-500 hover:bg-blue-50 transition-all">
                    <i class="fas fa-chevron-left text-xs"></i>
                </button>
            </div>

            <div id="pageIndicator" class="flex items-center justify-center space-x-2">
                </div>

            <div class="flex items-center justify-center space-x-2 w-full sm:w-auto">
                <button onclick="changePage(1)" id="nextBtn" class="h-11 w-11 rounded-xl border border-slate-100 bg-slate-50/50 text-slate-500 hover:bg-blue-50 transition-all">
                    <i class="fas fa-chevron-right text-xs"></i>
                </button>

            </div>
        </div>

        <div class="px-5 py-2 bg-slate-50 rounded-full border border-slate-100 order-2 md:order-1 w-fit">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest leading-none">
                Showing <span id="startRange" class="text-slate-800 font-black">0</span> - <span id="endRange" class="text-slate-800 font-black">0</span> 
                <span class="mx-1 text-slate-300">of</span> 
                <span id="totalEntries" class="text-slate-800 font-black">0</span>
            </p>
        </div>
    </div>

</div>


<div id="imagePreviewModal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-slate-900/95 backdrop-blur-md animate__animated animate__fadeIn animate__faster"></div>
    
    <div class="absolute top-6 right-6 z-[110] flex items-center space-x-3">
        
        <div class="flex items-center bg-slate-800/80 backdrop-blur-xl rounded-2xl p-1.5 border border-white/10 shadow-2xl">
            <button onclick="adjustZoom(-0.2)" class="w-10 h-10 rounded-xl hover:bg-white/10 flex items-center justify-center transition-all group" title="Zoom Out">
                <i class="fas fa-magnifying-glass-minus text-slate-400 group-hover:text-white"></i>
            </button>
            
            <div class="px-2 min-w-[55px] text-center border-x border-white/5 mx-1">
                <span id="zoomPercent" class="text-[10px] font-black text-blue-400 tracking-tighter">100%</span>
            </div>

            <button onclick="resetZoom()" class="px-3 h-10 rounded-xl hover:bg-white/10 flex items-center justify-center text-[9px] font-black uppercase transition-all text-slate-300 hover:text-white">
                Reset
            </button>
            
            <button onclick="adjustZoom(0.2)" class="w-10 h-10 rounded-xl hover:bg-white/10 flex items-center justify-center transition-all group" title="Zoom In">
                <i class="fas fa-magnifying-glass-plus text-slate-400 group-hover:text-white"></i>
            </button>
        </div>

        <button onclick="closeImageModal()" class="w-12 h-12 rounded-2xl bg-red-500/20 text-red-400 border border-red-500/20 flex items-center justify-center hover:bg-red-500 hover:text-white shadow-xl active:scale-90 transition-all" title="Close Preview">
            <i class="fas fa-times text-lg"></i>
        </button>
    </div>

    <div class="absolute inset-0 flex items-center justify-center p-8 overflow-auto sidebar-scroll">
        <div class="transition-transform duration-300 ease-out origin-center" id="zoomWrapper">
            <div class="mb-4 text-center">
                <span id="modalImageTitle" class="px-4 py-1.5 bg-white/5 border border-white/5 rounded-full text-[9px] font-black text-white/30 uppercase tracking-[0.2em]"></span>
            </div>
            <img id="previewImg" src="" alt="Zoomed Doc" class="max-h-[85vh] rounded-2xl shadow-2xl border border-white/5 bg-slate-800/50">
        </div>
    </div>
</div>



<div id="creditScoreModal" class="fixed inset-0 z-[160] hidden">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate__animated animate__fadeIn animate__faster" onclick="closeCreditScoreModal()"></div>
    
    <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="relative bg-white w-full max-w-md rounded-[3rem] shadow-2xl overflow-hidden animate__animated animate__zoomIn animate__faster border border-slate-100">
            
            <div class="p-8 text-center space-y-4">
                <div class="relative w-full max-w-[340px] mx-auto overflow-hidden px-4 pt-4">
                    <svg viewBox="0 0 220 120" class="w-full h-full">
                        <path d="M30,110 A80,80 0 0,1 62,40" fill="none" stroke="#ef4444" stroke-width="20" />
                        <path d="M62,40 A80,80 0 0,1 94,25" fill="none" stroke="#f59e0b" stroke-width="20" />
                        <path d="M94,25 A80,80 0 0,1 126,25" fill="none" stroke="#fbbf24" stroke-width="20" />
                        <path d="M126,25 A80,80 0 0,1 158,40" fill="none" stroke="#86efac" stroke-width="20" />
                        <path d="M158,40 A80,80 0 0,1 190,110" fill="none" stroke="#10b981" stroke-width="20" />
                        
                        <g id="needle" style="transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1); transform-origin: 110px 110px; transform: rotate(-90deg);">
                            <path d="M110,110 L110,35" stroke="#1e293b" stroke-width="4" stroke-linecap="round" />
                            <circle cx="110" cy="110" r="9" fill="#1e293b" />
                            <circle cx="110" cy="110" r="4" fill="white" />
                        </g>
                    </svg>

                    <div class="absolute bottom-6 left-0 right-0 flex flex-col items-center">
                        <span id="live_score_num" class="text-5xl font-black text-slate-800 tracking-tighter">300</span>
                        <span id="live_status_label" class="text-[10px] font-black px-4 py-1 mt-2 rounded-full bg-slate-100 text-slate-500 uppercase tracking-widest transition-all duration-500">POOR</span>
                    </div>
                </div>

                <div class="space-y-4 pt-4">
                    <div class="relative">
                        <label class="absolute -top-2 left-6 px-2 bg-white text-[9px] font-black text-slate-400 uppercase tracking-widest z-10">Assign Credit Score</label>
                        <input type="number" min=300 max=900 id="input_credit_score" placeholder="300-900" oninput="animateGauge(this.value)" required
                            class="[appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-[2rem] text-center text-3xl font-black text-slate-800 focus:outline-none focus:ring-4 focus:ring-slate-900/5 focus:border-slate-900 transition-all">
                         <input type="hidden" id="m_customer_id" />   
                         <input type="hidden" id="verification_status"/>
                    </div>
                    
                </div>

                 <div class="flex flex-col gap-2 pt-4">
                    <button onclick="saveCreditScore()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-600 transition-all active:scale-95 shadow-xl order-1">
                        Confirm & Update
                    </button>

                    <div class="flex gap-2 order-2">
                        <button onclick="closeCreditScoreModal()" class="flex-1 py-4 bg-rose-50 text-rose-500 border border-rose-100 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-100 transition-all active:scale-95 shadow-sm">
                            Cancel
                        </button>

                        <button onclick="NTC()" class="flex-1 py-4 bg-slate-100 text-slate-500 border border-slate-200 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-500 hover:text-white transition-all active:scale-95 shadow-sm">
                            NTC
                        </button>
                    </div>
                </div>

                <div class="inline-flex items-center gap-2 px-3 py-1 bg-blue-50 border border-blue-100 rounded-full shadow-sm">
                    <span class="flex h-2 w-2 rounded-full bg-blue-500 animate-pulse"></span>
                    <span class="text-[10px] font-black text-blue-700 uppercase tracking-widest">
                        NTC <span class="mx-1 text-blue-300">|</span> New To Credit
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="{{ url_for('static',filename='adminPanel/js/customerDesk/document_verification.js')}}"></script>
{% endblock content %}

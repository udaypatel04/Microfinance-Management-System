{% extends "adminPanel/base.html" %}

{% block title %}FinTrack | Gold Loan Approved{% endblock title %}

{% block content %}
<div class="space-y-6 animate__animated animate__fadeInUp animate__faster pb-20">
    
   <div class="relative flex flex-col lg:flex-row items-center justify-between gap-6 w-full mb-10 animate__animated animate__fadeInDown">
    
        <div class="flex items-center w-full lg:w-auto">
            <a href="/loan-approved" class="w-11 h-11 md:w-12 md:h-12 rounded-2xl bg-white border border-slate-100 flex items-center justify-center text-slate-400 hover:text-yellow-600 hover:shadow-lg transition-all group shadow-sm flex-shrink-0">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
            </a>
            
            <div class="flex-1 text-center lg:text-left lg:ml-6 lg:flex-none">
                <h1 class="text-xl md:text-2xl font-black text-slate-800 tracking-tight whitespace-nowrap">Gold Loan Approved</h1>
                <p class="text-[10px] md:text-sm text-slate-500 font-medium whitespace-nowrap">Registry of active jewelry collateral disbursements</p>
            </div>
        </div>

        <div class="flex items-center space-x-3 bg-yellow-50 border border-yellow-100 px-5 py-2.5 rounded-2xl shadow-sm">
            <i class="fas fa-coins text-yellow-600 text-xs"></i>
            <span class="text-[9px] md:text-[10px] font-black text-yellow-700 uppercase tracking-[0.15em]">Secured Portfolios</span>
        </div>
    </div>

    <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm transition-all focus-within:shadow-md">
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-search text-slate-400 group-focus-within:text-yellow-500 transition-all"></i>
            </div>
            <input type="text" id="goldSearch" onkeyup="filterGoldLoans()" 
                   class="block w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-yellow-500/20 transition-all" 
                   placeholder="Search by ID, Customer Name, or Gold Type...">
        </div>
    </div>

    <div class="grid grid-cols-1 gap-8" id="goldContainer">
        </div>

        <div id="pagination" class="hidden bg-white p-6 md:px-6 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6">
        
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 order-1 md:order-2 w-full md:w-auto">
            
            <div class="flex items-center justify-center space-x-2 w-full sm:w-auto">
            
                <button onclick="changePage(-1)" id="prevBtn" 
                        class="h-11 w-11 rounded-xl border border-slate-100 bg-slate-50/50 text-slate-500 hover:bg-blue-50 transition-all">
                    <i class="fas fa-chevron-left text-sm"></i>
                </button>
        </div>
            <div id="pageIndicator" class="flex items-center space-x-2 bg-slate-50/30 p-1.5 rounded-[1.25rem] border border-slate-50">
                </div>
        
        <div class="flex items-center justify-center space-x-2 w-full sm:w-auto">
            <button onclick="changePage(1)" id="nextBtn" 
                class="h-11 w-11 rounded-xl border border-slate-100 bg-slate-50/50 text-slate-500 hover:bg-blue-50 transition-all">
                <i class="fas fa-chevron-right text-sm"></i>
            </button>
        </div>
        </div>

        <div class="px-5 py-2 bg-slate-50 rounded-full border border-slate-100 order-2 md:order-1 w-fit">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest leading-none">
                Showing <span id="startRange" class="text-slate-800 font-black">0</span> - <span id="endRange" class="text-slate-800 font-black">0</span> 
                <span class="mx-1 text-slate-300">of</span> 
                <span id="totalEntries" class="text-slate-800 font-black">0</span>
            </p>
        </div>
    </div>
</div>




<script src="{{ url_for('static',filename='adminPanel/js/customerDesk/approved_gold_loans.js')}}"></script>

{% endblock content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <style>
        /* Responsive Overrides */
        @media screen and (max-width: 600px) {
            .content-padding {
                padding: 30px 20px !important;
            }
            .header-padding {
                padding: 30px 20px 20px 20px !important;
            }
            .footer-padding {
                padding: 24px 20px !important;
            }
            .mobile-title {
                font-size: 20px !important;
            }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; width: 100% !important; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f8fafc; background-image: linear-gradient(to bottom, #eff6ff 0%, #f8fafc 300px);">
        <tr>
            <td align="center" style="padding: 20px 10px;"> <table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width: 600px; background-color: #ffffff; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
                    
                    <tr>
                        <td class="header-padding" style="padding: 40px 40px 24px 40px; text-align: left;">
                            <table width="100%" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td>
                                        <h1 class="mobile-title" style="margin: 0; color: #1e293b; font-size: 24px; font-weight: 900; letter-spacing: -1px;">
                                            <span style="color: #2563eb;">Fin</span>Track
                                        </h1>
                                    </td>
                                    <td align="right">
                                        <table border="0" cellspacing="0" cellpadding="0" style="display: inline-block;">
                                            <tr>
                                                <td style="width: 36px; height: 36px; background-color: #eff6ff; border-radius: 10px; text-align: center; vertical-align: middle;">
                                                    <span style="color: #2563eb; font-weight: 800; font-size: 16px;">F</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td class="content-padding" style="padding: 0 40px 40px 40px; color: #475569; font-size: 15px; line-height: 1.6;">
                            {% block email_content %}{% endblock %}
                        </td>
                    </tr>

                    <tr>
                        <td class="footer-padding" style="padding: 32px 40px; background-color: #fdfdfd; border-top: 1px solid #f1f5f9; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; text-align: center;">
                            <p style="margin: 0; font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;">
                                Secure Financial Management
                            </p>
                            <div style="margin-top: 12px; font-size: 11px; color: #cbd5e1;">
                                &copy; 2026 FinTrack Services &bull; All Rights Reserved
                            </div>
                            <div style="margin-top: 12px;">
                                <a href="#" style="color: #64748b; text-decoration: none; font-size: 11px; font-weight: 600; margin: 0 5px;">Privacy</a>
                                <span style="color: #e2e8f0;">&bull;</span>
                                <a href="#" style="color: #64748b; text-decoration: none; font-size: 11px; font-weight: 600; margin: 0 5px;">Support</a>
                            </div>
                        </td>
                    </tr>
                </table>

                <table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width: 600px;">
                    <tr>
                        <td style="padding: 24px 10px; font-size: 12px; color: #94a3b8; text-align: center; line-height: 1.5;">
                            You're receiving this because you're a registered FinTrack user.<br>
                            <a href="#" style="color: #2563eb; text-decoration: underline;">Manage Preferences</a>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>
</body>
</html>

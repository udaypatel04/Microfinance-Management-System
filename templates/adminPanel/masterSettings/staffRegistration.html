{% extends "adminPanel/base.html" %}

{% block title %}FinTrack | Staff Registration{% endblock title %}

{% block content %}
<div class="space-y-6 animate__animated animate__fadeInUp animate__faster">
    
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 items-center lg:items-start text-center lg:text-left animate__animated animate__fadeInDown">
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Staff Registration</h1>
            <p class="text-sm text-slate-500 font-medium">Manage employee records and system access</p>
        </div>
    </div>

    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm transition-all duration-300 hover:shadow-md min-h-[600px]">
        <h2 class="text-xs font-black text-blue-600 uppercase tracking-[0.2em] mb-8">Registration</h2>
        
        <form id="staff-registration-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-6">
                
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Full Name</label>
                    <input id="full_name" type="text"
                     onKeyPress="return (event.charCode > 64 && event.charCode < 91) || (event.charCode > 96 && event.charCode < 123) || (event.charCode==32)"
                     pattern="[A-Z a-z ]{2,}"
                    placeholder="Enter full name" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">City</label>
                    <input id="city" type="text" placeholder="Enter city"
                     onKeyPress="return (event.charCode > 64 && event.charCode < 91) || (event.charCode > 96 && event.charCode < 123) || (event.charCode==32)"
                     pattern="[A-Z a-z ]{2,}"
                     class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Mobile Number</label>
                    <input id="mob_number" type="tel" placeholder="Mobile number" 
                    pattern="[6-9][0-9]{9}" 
                    title="Phone number must be 10 digits and start with 6, 7, 8, or 9"
                    maxlength="10" 
                    placeholder="9876543210"
                    onkeypress="return (event.charCode >= 48 && event.charCode <= 57)"

                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>

                <div class="md:col-span-3 space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Address</label>
                    <textarea id="address" rows="3" 
                    onKeyPress="return (event.charCode > 64 && event.charCode < 91) || (event.charCode > 96 && event.charCode < 123) || (event.charCode >= 48 && event.charCode <= 57) || [32, 44, 45, 46, 47].includes(event.charCode)"
                    pattern="[A-Za-z0-9\s,\-\.\/]{5,}"
 
                    placeholder="Residential address..." class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500/20 resize-none"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Gender</label>
                    <select id="gender" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20">
                        <option>Male</option>
                        <option>Female</option>
                       
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Email Address</label>
                    <input id="email" type="email" placeholder="email@fintrack.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Password</label>
                    <input id="password" type="password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Date of Birth</label>
                    <input id="dob" type="date" 
                    onfocus="this.max = new Date(new Date().setFullYear(new Date().getFullYear() - 18)).toISOString().split('T')[0]"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-600 outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Joining Date</label>
                    <input id="joining_date" type="date"
                     onfocus="this.max = new Date(new Date().setDate(new Date().getDate() - 2)).toISOString().split('T')[0]"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold text-slate-600 outline-none focus:ring-2 focus:ring-blue-500/20">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white h-[52px] rounded-2xl font-bold shadow-lg shadow-blue-200 transition-all active:scale-95 flex items-center justify-center space-x-2">
                    <i class="fas fa-user-plus text-base"></i><span>Register Staff Member</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='adminPanel/js/masterSettings/staff_registration.js') }}"></script>
{% endblock content %}

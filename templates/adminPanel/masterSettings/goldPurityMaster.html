{% extends "adminPanel/base.html" %}

{% block title %}FinTrack | Gold Purity Master{% endblock title %}

{% block content %}
<div class="space-y-6 animate__animated animate__fadeInUp animate__faster">
    
   <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 items-center lg:items-start text-center lg:text-left animate__animated animate__fadeInDown">
    <div>
        <h1 class="text-2xl font-black text-slate-800 tracking-tight">Gold Purity Master</h1>
        <p class="text-sm text-slate-500 font-medium">Configure karat values for accurate loan valuation</p>
    </div>
</div>

    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm transition-all duration-300 hover:shadow-md hover:-translate-y-1">
        <h2 class="text-xs font-black text-blue-600 uppercase tracking-[0.2em] mb-4">Gold Purity List</h2>
        <form id="add-gold-purity" class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
            <div class="space-y-2">
                <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Loan category</label>
                <div class="relative">
                    <input type="text" value="Gold Loan" disabled 
                           class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-2xl text-sm font-bold text-slate-500 cursor-not-allowed">
                    <div class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400">
                        <i class="fas fa-lock text-xs"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Gold Purity (e.g. 22K, 24K)</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-certificate text-slate-400 group-focus-within:text-blue-500 transition-all"></i>
                    </div>
                    <input type="text" id="purityInput"
                           class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" 
                           placeholder="Enter purity value...">
                </div>
            </div>

            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white h-[46px] rounded-2xl font-bold shadow-lg shadow-blue-200 transition-all active:scale-95 flex items-center justify-center space-x-2">
                <i class="fas fa-plus-circle"></i>
                <span>Add Purity</span>
            </button>
        </form>
    </div>

    <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm transition-all focus-within:shadow-md duration-300">
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-search text-slate-400 group-focus-within:text-blue-500 transition-all"></i>
            </div>
            <input type="text" id="puritySearch" onkeyup="filterPurityCards()"
                   class="block w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all" 
                   placeholder="Search purity value...">
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden animate__animated animate__fadeInUp animate__delay-1s">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3  gap-4 p-4" id="cardContainer">
            </div>
    </div>

        <div id="pagination" class="hidden bg-white p-6 md:px-6 rounded-[2rem] border border-slate-100 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6">
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 order-1 md:order-2 w-full md:w-auto">
                
                <div class="flex items-center justify-center space-x-2 w-full sm:w-auto">
                    
                    <button onclick="changePage(-1)" id="prevBtn" class="h-11 w-11 rounded-xl border border-slate-100 bg-slate-50/50 text-slate-500 hover:bg-blue-50 transition-all">
                        <i class="fas fa-chevron-left text-xs"></i>
                    </button>
                </div>

                <div id="pageIndicator" class="flex items-center justify-center space-x-2">
                    </div>

                <div class="flex items-center justify-center space-x-2 w-full sm:w-auto">
                    <button onclick="changePage(1)" id="nextBtn" class="h-11 w-11 rounded-xl border border-slate-100 bg-slate-50/50 text-slate-500 hover:bg-blue-50 transition-all">
                        <i class="fas fa-chevron-right text-xs"></i>
                    </button>

                </div>
            </div>

            <div class="px-5 py-2 bg-slate-50 rounded-full border border-slate-100 order-2 md:order-1 w-fit">
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest leading-none">
                    Showing <span id="startRange" class="text-slate-800 font-black">0</span> - <span id="endRange" class="text-slate-800 font-black">0</span> 
                    <span class="mx-1 text-slate-300">of</span> 
                    <span id="totalEntries" class="text-slate-800 font-black">0</span>
                </p>
            </div>
        </div>
</div>

<div id="editModal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl animate__animated animate__zoomIn animate__faster">
            <div class="flex items-center justify-between p-6 border-b border-slate-50">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fas fa-edit"></i></div>
                    <h3 class="text-lg font-black text-slate-800">Edit Purity</h3>
                </div>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="edit-gold-purity-Form" class="p-6 space-y-5">
                <input type="hidden" id="editId">
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Gold Purity</label>
                    <input type="text" id="editPurityInput" class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-black text-slate-700 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all">
                </div>
                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="closeEditModal()" class="flex-1 py-3 rounded-2xl border border-slate-200 text-slate-600 font-bold active:scale-95">Cancel</button>
                    <button type="submit" class="flex-1 py-3 rounded-2xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-200 active:scale-95">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="{{ url_for('static',filename='adminPanel/js/masterSettings/gold_purity_master.js') }}" > </script>
{% endblock content %}
